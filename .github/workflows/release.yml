name: Build & Sign ProxSwitch APKs

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug - list repository structure
        run: |
          echo "=== Root ==="
          ls -la
          echo "=== tile/ ==="
          ls -laR tile/ || echo "tile/ not found"
          echo "=== xposed/ ==="
          ls -laR xposed/ || echo "xposed/ not found"

      - name: Ensure manifest files exist
        run: |
          # Create tile manifest if missing
          if [ ! -f tile/src/main/AndroidManifest.xml ]; then
            echo "Creating tile/src/main/AndroidManifest.xml"
            mkdir -p tile/src/main
            cat > tile/src/main/AndroidManifest.xml << 'MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <uses-permission android:name="android.permission.ACCESS_SUPERUSER" />

              <application
                  android:allowBackup="true"
                  android:icon="@drawable/ic_prox_tile"
                  android:label="ProxSwitch"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.AppCompat.Transparent">

                  <service
                      android:name=".ProxSwitchTileService"
                      android:icon="@drawable/ic_prox_tile"
                      android:label="ProxSwitch"
                      android:permission="android.permission.BIND_QUICK_SETTINGS_TILE"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.service.quicksettings.action.QS_TILE" />
                      </intent-filter>
                  </service>

                  <activity
                      android:name=".RegisterActivity"
                      android:exported="true"
                      android:excludeFromRecents="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          MANIFEST
          else
            echo "tile manifest already exists"
          fi

          # Create xposed manifest if missing
          if [ ! -f xposed/src/main/AndroidManifest.xml ]; then
            echo "Creating xposed/src/main/AndroidManifest.xml"
            mkdir -p xposed/src/main
            cat > xposed/src/main/AndroidManifest.xml << 'MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.anemia004.proxswitch.xposed">

              <application
                  android:allowBackup="true"
                  android:icon="@drawable/ic_prox_tile"
                  android:label="ProxSwitch Xposed"
                  android:supportsRtl="true">

                  <meta-data
                      android:name="xposedmodule"
                      android:value="true" />
                  <meta-data
                      android:name="xposeddescription"
                      android:value="Proximity sensor toggle (persistent across reboots)" />
                  <meta-data
                      android:name="xposedminversion"
                      android:value="82" />
              </application>
          </manifest>
          MANIFEST
          else
            echo "xposed manifest already exists"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: '34.0.0'
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Build both modules
        run: gradle assembleRelease

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > release.keystore

      - name: Sign Tile APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          $ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner sign \
            --ks release.keystore \
            --ks-pass pass:$KEYSTORE_PASSWORD \
            --ks-key-alias $KEY_ALIAS \
            --key-pass pass:$KEY_PASSWORD \
            --out tile-signed.apk \
            tile/build/outputs/apk/release/tile-release-unsigned.apk

      - name: Sign Xposed APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          $ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner sign \
            --ks release.keystore \
            --ks-pass pass:$KEYSTORE_PASSWORD \
            --ks-key-alias $KEY_ALIAS \
            --key-pass pass:$KEY_PASSWORD \
            --out xposed-signed.apk \
            xposed/build/outputs/apk/release/xposed-release-unsigned.apk

      - name: Upload Tile APK
        uses: actions/upload-artifact@v4
        with:
          name: ProxSwitch-Tile-signed
          path: tile-signed.apk

      - name: Upload Xposed APK
        uses: actions/upload-artifact@v4
        with:
          name: ProxSwitch-Xposed-signed
          path: xposed-signed.apk
          
