name: Build, Sign & Release ProxSwitch APKs

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write               # needed for creating releases

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # =================================================================
      # 1. Create tile module files
      # =================================================================
      - name: Create tile module files
        run: |
          set -e
          mkdir -p tile/src/main/java/com/anemia004/proxswitch
          mkdir -p tile/src/main/res/drawable

          cat > tile/build.gradle <<'GRADLE'
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }
          android {
              namespace 'com.anemia004.proxswitch'
              compileSdk 34
              defaultConfig {
                  applicationId "com.anemia004.proxswitch"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes { release { minifyEnabled false } }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              kotlinOptions { jvmTarget = '17' }
          }
          dependencies {
              implementation 'androidx.core:core-ktx:1.10.1'
          }
          GRADLE

          cat > tile/src/main/AndroidManifest.xml <<'MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.ACCESS_SUPERUSER" />
              <application
                  android:allowBackup="true"
                  android:icon="@drawable/ic_prox_tile"
                  android:label="ProxSwitch"
                  android:supportsRtl="true">
                  <service
                      android:name=".ProxSwitchTileService"
                      android:icon="@drawable/ic_prox_tile"
                      android:label="ProxSwitch"
                      android:permission="android.permission.BIND_QUICK_SETTINGS_TILE"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.service.quicksettings.action.QS_TILE" />
                      </intent-filter>
                  </service>
                  <activity
                      android:name=".RegisterActivity"
                      android:exported="true"
                      android:excludeFromRecents="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          MANIFEST

          cat > tile/src/main/java/com/anemia004/proxswitch/RegisterActivity.kt <<'KOTLIN'
          package com.anemia004.proxswitch
          import android.app.Activity
          import android.os.Bundle
          class RegisterActivity : Activity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  finish()
              }
          }
          KOTLIN

          cat > tile/src/main/java/com/anemia004/proxswitch/ProxSwitchTileService.kt <<'KOTLIN'
          package com.anemia004.proxswitch

          import android.os.Handler
          import android.os.Looper
          import android.service.quicksettings.Tile
          import android.service.quicksettings.TileService
          import java.io.File

          class ProxSwitchTileService : TileService() {

              companion object {
                  private const val STATE_FILE = "/data/local/proxswitch_state"
              }

              private val handler = Handler(Looper.getMainLooper())

              override fun onTileAdded() {
                  super.onTileAdded()
                  refreshTile()
              }

              override fun onStartListening() {
                  super.onStartListening()
                  refreshTile()
              }

              override fun onClick() {
                  super.onClick()
                  if (isSecure) {
                      unlockAndRun { toggle() }
                  } else {
                      toggle()
                  }
              }

              private fun toggle() {
                  Thread {
                      val currentlyDisabled = readState()
                      writeState(!currentlyDisabled)
                      handler.post { refreshTile() }
                  }.start()
              }

              private fun readState(): Boolean {
                  val f = File(STATE_FILE)
                  return f.exists() && f.readText().trim() == "1"
              }

              private fun writeState(disabled: Boolean) {
                  val value = if (disabled) "1" else "0"
                  execRoot("echo $value > $STATE_FILE")
                  execRoot("chmod 644 $STATE_FILE")
              }

              private fun refreshTile() {
                  val t = qsTile
                  val disabled = readState()
                  t.state = if (disabled) Tile.STATE_ACTIVE else Tile.STATE_INACTIVE
                  t.label = if (disabled) "Prox OFF" else "Prox ON"
                  t.updateTile()
              }

              private fun execRoot(cmd: String) {
                  try {
                      val p = Runtime.getRuntime().exec(arrayOf("su", "-c", cmd))
                      p.waitFor()
                  } catch (_: Exception) {}
              }
          }
          KOTLIN

          cat > tile/src/main/res/drawable/ic_prox_tile.xml <<'XML'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="24dp" android:height="24dp"
              android:viewportWidth="24" android:viewportHeight="24"
              android:tint="#FFFFFF">
              <path android:fillColor="@android:color/white"
                  android:pathData="M12,2C6.48,2 2,6.48 2,12s4.48,10 10,10 10,-4.48 10,-10S17.52,2 12,2zM12,20c-4.41,0 -8,-3.59 -8,-8s3.59,-8 8,-8 8,3.59 8,8 -3.59,8 -8,8zM11,7h2v6h-2zM11,15h2v2h-2z"/>
          </vector>
          XML

      # =================================================================
      # 2. Create Xposed module files (with stubs – NO JAR)
      # =================================================================
      - name: Create Xposed module (with stubs)
        run: |
          set -e
          mkdir -p xposed/src/main/java/com/anemia004/proxswitch/xposed
          mkdir -p xposed/src/main/assets
          mkdir -p xposed/src/main/res/drawable

          mkdir -p xposed/stubs/java/de/robv/android/xposed
          mkdir -p xposed/stubs/java/de/robv/android/xposed/callbacks

          cat > xposed/stubs/java/de/robv/android/xposed/IXposedHookLoadPackage.java <<'STUB'
          package de.robv.android.xposed;
          import de.robv.android.xposed.callbacks.XC_LoadPackage;
          public interface IXposedHookLoadPackage {
              void handleLoadPackage(XC_LoadPackage.LoadPackageParam lpparam) throws Throwable;
          }
          STUB

          cat > xposed/stubs/java/de/robv/android/xposed/callbacks/XC_LoadPackage.java <<'STUB'
          package de.robv.android.xposed.callbacks;
          public class XC_LoadPackage {
              public static final class LoadPackageParam {
                  public String packageName;
                  public ClassLoader classLoader;
              }
          }
          STUB

          cat > xposed/stubs/java/de/robv/android/xposed/XC_MethodHook.java <<'STUB'
          package de.robv.android.xposed;
          public abstract class XC_MethodHook {
              public static class MethodHookParam {
                  public Object[] args;
                  public Object getResult() { return null; }
                  public void setResult(Object result) {}
              }
              protected void beforeHookedMethod(MethodHookParam param) throws Throwable {}
              protected void afterHookedMethod(MethodHookParam param) throws Throwable {}
          }
          STUB

          cat > xposed/stubs/java/de/robv/android/xposed/XposedHelpers.java <<'STUB'
          package de.robv.android.xposed;
          public class XposedHelpers {
              public static void findAndHookMethod(String className, ClassLoader classLoader,
                  String methodName, Object... parameterTypesAndCallback) {}
              public static void findAndHookMethod(Class<?> clazz, String methodName,
                  Object... parameterTypesAndCallback) {}
          }
          STUB

          cat > xposed/build.gradle <<'GRADLE'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.anemia004.proxswitch.xposed'
              compileSdk 34
              defaultConfig {
                  applicationId "com.anemia004.proxswitch.xposed"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes { release { minifyEnabled false } }
              sourceSets {
                  main {
                      java {
                          srcDir 'stubs/java'
                      }
                  }
              }
          }
          GRADLE

          cat > xposed/src/main/AndroidManifest.xml <<'MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.anemia004.proxswitch.xposed">
              <application
                  android:allowBackup="true"
                  android:icon="@drawable/ic_prox_tile"
                  android:label="ProxSwitch Xposed"
                  android:supportsRtl="true">
                  <meta-data android:name="xposedmodule" android:value="true" />
                  <meta-data android:name="xposeddescription"
                      android:value="Proximity sensor toggle (persistent across reboots)" />
                  <meta-data android:name="xposedminversion" android:value="82" />
              </application>
          </manifest>
          MANIFEST

          echo "com.anemia004.proxswitch.xposed.ProxSwitchHook" > xposed/src/main/assets/xposed_init

          cat > xposed/src/main/java/com/anemia004/proxswitch/xposed/ProxSwitchHook.java <<'JAVA'
          package com.anemia004.proxswitch.xposed;
          import android.hardware.Sensor;
          import android.hardware.SensorEventListener;
          import java.io.BufferedReader;
          import java.io.File;
          import java.io.FileReader;
          import de.robv.android.xposed.IXposedHookLoadPackage;
          import de.robv.android.xposed.XC_MethodHook;
          import de.robv.android.xposed.XposedHelpers;
          import de.robv.android.xposed.callbacks.XC_LoadPackage;
          public class ProxSwitchHook implements IXposedHookLoadPackage {
              private static final String STATE_FILE = "/data/local/proxswitch_state";
              @Override
              public void handleLoadPackage(XC_LoadPackage.LoadPackageParam lpparam) {
                  if (!lpparam.packageName.equals("android")) return;
                  XposedHelpers.findAndHookMethod(
                      "android.hardware.SystemSensorManager",
                      lpparam.classLoader,
                      "registerListenerImpl",
                      SensorEventListener.class, Sensor.class, int.class,
                      android.os.Handler.class, int.class, int.class,
                      new XC_MethodHook() {
                          @Override
                          protected void beforeHookedMethod(MethodHookParam param) {
                              if (isProxDisabled()) {
                                  Sensor sensor = (Sensor) param.args[1];
                                  if (sensor.getType() == Sensor.TYPE_PROXIMITY) {
                                      param.setResult(null);
                                  }
                              }
                          }
                      });
              }
              private boolean isProxDisabled() {
                  try {
                      File f = new File(STATE_FILE);
                      if (!f.exists()) return false;
                      BufferedReader br = new BufferedReader(new FileReader(f));
                      String line = br.readLine();
                      br.close();
                      return "1".equals(line);
                  } catch (Exception ignored) { return false; }
              }
          }
          JAVA

          cat > xposed/src/main/res/drawable/ic_prox_tile.xml <<'XML'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="24dp" android:height="24dp"
              android:viewportWidth="24" android:viewportHeight="24"
              android:tint="#FFFFFF">
              <path android:fillColor="@android:color/white"
                  android:pathData="M12,2C6.48,2 2,6.48 2,12s4.48,10 10,10 10,-4.48 10,-10S17.52,2 12,2zM12,20c-4.41,0 -8,-3.59 -8,-8s3.59,-8 8,-8 8,3.59 8,8 -3.59,8 -8,8zM11,7h2v6h-2zM11,15h2v2h-2z"/>
          </vector>
          XML

      # =================================================================
      # 3. Root Gradle files
      # =================================================================
      - name: Ensure root Gradle files
        run: |
          set -e
          cat > settings.gradle <<'GRADLE'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "ProxSwitch"
          include ':tile'
          include ':xposed'
          GRADLE

          cat > build.gradle <<'GRADLE'
          plugins {
              id 'com.android.application' version '8.2.0' apply false
              id 'org.jetbrains.kotlin.android' version '1.9.20' apply false
          }
          GRADLE

      # =================================================================
      # 4. Build, sign, and upload
      # =================================================================
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: '34.0.0'
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Build both modules
        run: gradle assembleRelease

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > release.keystore

      - name: Prepare password files
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          printf "%s" "$KEYSTORE_PASSWORD" > storepass.txt
          printf "%s" "$KEY_PASSWORD" > keypass.txt

      - name: Verify keystore
        run: |
          echo "Checking keystore validity..."
          keytool -list -keystore release.keystore -storepass:file storepass.txt || {
            echo "KEYSTORE VERIFICATION FAILED"
            exit 1
          }
          echo "Keystore verified OK."

      - name: Sign Tile APK
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          $ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner sign \
            --ks release.keystore \
            --ks-pass file:storepass.txt \
            --ks-key-alias $KEY_ALIAS \
            --key-pass file:keypass.txt \
            --out tile-signed.apk \
            tile/build/outputs/apk/release/tile-release-unsigned.apk

      - name: Sign Xposed APK
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          $ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner sign \
            --ks release.keystore \
            --ks-pass file:storepass.txt \
            --ks-key-alias $KEY_ALIAS \
            --key-pass file:keypass.txt \
            --out xposed-signed.apk \
            xposed/build/outputs/apk/release/xposed-release-unsigned.apk

      # =================================================================
      # Automatically create a Release and attach the APKs
      # =================================================================
      - name: Create GitHub Release and upload APKs
        uses: softprops/action-gh-release@v1
        with:
          files: |
            tile-signed.apk
            xposed-signed.apk
          name: "ProxSwitch ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          body: |
            ProxSwitch – Xposed-powered proximity sensor toggle.

            📦 **Tile APK** – Quick Settings toggle (requires root).  
            📦 **Xposed Module APK** – Hooks into the framework to block the proximity sensor persistently.

            **Compatibility:** Android 5.0+ (including Android 7), classic Xposed Framework / LSPosed.

            **How it works:**  
            - Tile writes `1` or `0` to `/data/local/proxswitch_state`.  
            - Xposed module reads that flag and blocks `Sensor.TYPE_PROXIMITY` when disabled.  
            - State survives reboots.

            **Installation:**  
            1. Install the Xposed module, activate in Xposed Installer, reboot.  
            2. Install the tile app, open once, add the tile to Quick Settings.  
            3. Tap to toggle – grant root when prompted.

            Built from source on GitHub Actions. No external dependencies, no telemetry.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
