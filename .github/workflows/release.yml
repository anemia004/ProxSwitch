name: Build & Sign ProxSwitch APKs

on:
  push:
    tags:
      - 'v*'          # Runs when you push a tag like v1.0
  workflow_dispatch:   # Allows manual run from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: '34.0.0'
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Grant execute permission for gradlew
        run: chmod +x ./tile/gradlew ./xposed/gradlew

      # Build the Tile APK
      - name: Build Tile APK
        working-directory: ./tile
        run: ./gradlew assembleRelease

      # Build the Xposed Module APK
      - name: Build Xposed APK
        working-directory: ./xposed
        run: ./gradlew assembleRelease

      # Decode the keystore from secret
      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > release.keystore

      # Sign Tile APK
      - name: Sign Tile APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          $ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner sign \
            --ks release.keystore \
            --ks-pass pass:$KEYSTORE_PASSWORD \
            --ks-key-alias $KEY_ALIAS \
            --key-pass pass:$KEY_PASSWORD \
            --out tile-signed.apk \
            tile/build/outputs/apk/release/tile-release-unsigned.apk

      # Sign Xposed APK
      - name: Sign Xposed APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          $ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner sign \
            --ks release.keystore \
            --ks-pass pass:$KEYSTORE_PASSWORD \
            --ks-key-alias $KEY_ALIAS \
            --key-pass pass:$KEY_PASSWORD \
            --out xposed-signed.apk \
            xposed/build/outputs/apk/release/xposed-release-unsigned.apk

      # Upload signed APKs as artifacts
      - name: Upload Tile APK
        uses: actions/upload-artifact@v4
        with:
          name: ProxSwitch-Tile-signed
          path: tile-signed.apk

      - name: Upload Xposed APK
        uses: actions/upload-artifact@v4
        with:
          name: ProxSwitch-Xposed-signed
          path: xposed-signed.apk
