plugins {
    id 'com.android.application'
}

android {
    namespace 'com.anemia004.proxswitch.xposed'
    compileSdk 34
    defaultConfig {
        applicationId "com.anemia004.proxswitch.xposed"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    compileOnly 'de.robv.android.xposed:api:82'
}
